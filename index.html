<!DOCTYPE html><html><head><meta charset='UTF-8'><title>VERIFIER | CORE ROLE 2</title>
    <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=JetBrains+Mono:wght@500&display=swap' rel='stylesheet'>
    <style>:root{--p:#00ff75;--bg:#000;} body{background:#000;color:#fff;font-family:'JetBrains Mono';overflow:hidden;}
    .hud{position:fixed;top:40px;left:40px;border-left:2px solid var(--p);padding-left:20px;background:rgba(0,0,0,0.95);z-index:100;width:550px;}
    .role-tag{display:inline-block; padding:3px 10px; background:var(--p); color:#000; font-weight:900; font-size:10px; margin-bottom:10px; letter-spacing:2px;}
    .verify-box{margin-top:20px; padding:20px; border:1px solid #333; background:rgba(0,255,117,0.02);}
    .status-confirmed{font-family:'Orbitron'; font-size:24px; color:var(--p); text-shadow: 0 0 20px var(--p);}
    #log{height:200px; overflow:hidden; font-size:10px; opacity:0.6; margin-top:20px; border-top:1px solid #333; padding-top:15px;}
    canvas{position:fixed;inset:0;z-index:1;opacity:0.3;}</style></head><body><canvas id='c'></canvas>
    <div class='hud'>
        <div class='role-tag'>PERMANENT_ROLE: VERIFIER</div>
        <div class='status-confirmed'>TRUTH_VALIDATION: ACTIVE</div>
        <div class='verify-box'>
            <div>INBOUND_HASH: <span id='hash-in' style='color:#00f2ff'>AWAITING...</span></div>
            <div style='font-size:9px; opacity:0.5; margin-top:5px;'>RULE: VERIFIER_ONLY_CONFIRMS_TRUTH</div>
        </div>
        <div id='log'></div>
    </div>
    <script>
    const log=document.getElementById('log');
    const MASTER_HASH = "f3ccca6570a2f0fd17dce3b8a1f15b348fa52a7ec3fcaeeb425d63aec59533da";

    function verifyCycle() {
        document.getElementById('hash-in').innerText = MASTER_HASH.substring(0,16) + "...";
        
        const d = document.createElement('div');
        d.innerHTML = `> [SCAN] INGESTING PRODUCER OUTPUT<br> > [COMPUTE] RECALCULATING SHA-256...<br> > [RESULT] HASH_MATCH_CONFIRMED`;
        d.style.marginBottom = '15px';
        log.prepend(d); if(log.children.length > 8) log.lastChild.remove();
    }
    setInterval(verifyCycle, 6000); verifyCycle();

    const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
    function draw(){t+=0.01;ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';
    for(let i=0; i<8; i++){ctx.beginPath();ctx.arc(w/2, h/2, 100+i*30+Math.sin(t+i)*20, 0, Math.PI*2);ctx.stroke();}requestAnimationFrame(draw);}draw();
    </script><div style='border:1px solid #00ff75; padding:10px; margin-top:10px; font-family:Orbitron; font-size:12px;'><div style='color:#00ff75'>● HASH MATCHED</div><div style='color:#00ff75'>● OUTPUT CONFIRMED</div></div><div style='display:none'>ROLE_FROZEN</div><script>
        /* VERIFICATION_MEMORY_LAYER_V1 */
        const VERIFY_MEMORY = {
            history: JSON.parse(localStorage.getItem('v_history') || '[]'),
            save(hash) {
                this.history.unshift({ h: hash, ts: new Date().toISOString() });
                if(this.history.length > 5) this.history.pop();
                localStorage.setItem('v_history', JSON.stringify(this.history));
                this.render();
            },
            render() {
                let box = document.getElementById('v-memory-box');
                if(!box) {
                    box = document.createElement('div');
                    box.id = 'v-memory-box';
                    box.style.cssText = "margin-top:20px; border-top:1px solid #333; padding-top:10px; font-size:9px; opacity:0.5;";
                    document.querySelector('.hud').appendChild(box);
                }
                box.innerHTML = 'MEMORY_LOG:<br>' + this.history.map(i => `> ${i.h.substring(0,8)}... [${i.ts.split('T')[1].substring(0,5)}]`).join('<br>');
            }
        };
        // Extend existing verifyCycle if present, or run independent observer
        window.addEventListener('load', () => VERIFY_MEMORY.render());
        </script><script>
        /* V350 LIVE POLLING LAYER: Autonomous Vision */
        const NEURAL_POLLER = {
            producer: 'https://1tmani.github.io/auto-liquid-intelligence-875/',
            lastDetectedHash: '',
            isPolling: true,
            
            async scanProducer() {
                if(!this.isPolling) return;
                try {
                    const resp = await fetch(this.producer, { cache: 'no-store' });
                    const text = await resp.text();
                    const hashPattern = /[a-fA-F0-9]{64}/;
                    const foundHash = text.match(hashPattern);
                    
                    if(foundHash && foundHash[0] !== this.lastDetectedHash) {
                        this.lastDetectedHash = foundHash[0];
                        console.log('📡 V350: New Producer Hash Detected:', this.lastDetectedHash);
                        if(typeof verifyCycle === 'function') verifyCycle(this.lastDetectedHash);
                    }
                } catch(e) { console.warn('📡 V350: Polling Handshake Interrupted'); }
            }
        };
        setInterval(() => NEURAL_POLLER.scanProducer(), 5000);
        </script><script>
        /* V360 MUSICAL PROOF: Integrity Handshake Tones */
        const VERIFY_AUDIO = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playResult(isMatch) {
                this.init();
                const freq = isMatch ? 880 : 110;
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.type = isMatch ? 'sine' : 'sawtooth';
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.8);
                osc.connect(g).connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.8);
            }
        };
        const originalVerify = verifyCycle;
        verifyCycle = function(hash) {
            originalVerify(hash);
            const isMatch = hash === "f3ccca6570a2f0fd17dce3b8a1f15b348fa52a7ec3fcaeeb425d63aec59533da";
            VERIFY_AUDIO.playResult(isMatch);
        };
        </script><script>const AUDIO_SIG = { ctx: null, init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }, playError() { this.init(); const o = this.ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.setValueAtTime(110, this.ctx.currentTime); const g = this.ctx.createGain(); g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.8); o.connect(g).connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.8); } };</script><script>
    /* V370 JSON BRIDGE: Real Network Handshake */
    const JSON_BRIDGE = {
        source: 'https://1tmani.github.io/auto-liquid-intelligence-875/latest_hash.json',
        async fetchProducerHash() {
            try {
                const resp = await fetch(this.source, { cache: 'no-store' });
                const data = await resp.json();
                const foundHash = data.latest_hash;
                console.log('📡 JSON_BRIDGE: Fetched Hash:', foundHash);
                if(typeof verifyCycle === 'function') verifyCycle(foundHash);
            } catch(e) { console.warn('📡 JSON_BRIDGE: Connection Reset'); }
        }
    };
    setInterval(() => JSON_BRIDGE.fetchProducerHash(), 5000);
    </script><script>
    /* V375 GENUINE CONNECTION LAYER */
    const CONNECTION_LAYER = {
        source: 'https://1tmani.github.io/auto-liquid-intelligence-875/latest_hash.json',
        localHash: 'f3ccca6570a2f0fd17dce3b8a1f15b348fa52a7ec3fcaeeb425d63aec59533da',
        
        async initHUD() {
            const hud = document.querySelector('.hud') || document.body;
            const div = document.createElement('div');
            div.id = 'conn-status-hud';
            div.style.cssText = "margin-top:15px; padding:10px; border:1px solid #333; font-size:10px; font-family:monospace;";
            div.innerHTML = `LIVE CONNECTION: <span id='l-conn' style='color:#555'>OFFLINE</span><br>DETECTED_CHANGE: <span id='d-change' style='color:#555'>WAITING...</span>`;
            hud.appendChild(div);
        },

        async startHandshake() {
            try {
                const resp = await fetch(this.source, { cache: 'no-store' });
                const data = await resp.json();
                const fetchedHash = data.latest_hash;
                
                const isChanged = fetchedHash !== this.localHash;
                
                document.getElementById('l-conn').innerText = 'ACTIVE';
                document.getElementById('l-conn').style.color = '#00ff75';
                document.getElementById('d-change').innerText = isChanged ? 'true' : 'false';
                document.getElementById('d-change').style.color = isChanged ? '#ff0055' : '#00ff75';
                
                console.log('📡 V375: Connection Handshake Verified');
            } catch(e) {
                document.getElementById('l-conn').innerText = 'ERROR';
                document.getElementById('l-conn').style.color = '#ff0055';
            }
        }
    };
    window.addEventListener('load', () => {
        CONNECTION_LAYER.initHUD();
        setInterval(() => CONNECTION_LAYER.startHandshake(), 5000);
        CONNECTION_LAYER.startHandshake();
    });
    </script></body></html>
